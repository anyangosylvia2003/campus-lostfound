{% extends 'base.html' %}
{% block title %}Delete Item - Campus Lost & Found{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow text-center p-4" style="border-radius:20px;">
        <div class="mb-3" style="font-size:4rem; color:#DC3545;">
          <i class="bi bi-trash"></i>
        </div>
        <h3 class="fw-bold">Delete Item?</h3>
        <p class="text-muted mb-1">You are about to delete:</p>
        <p class="fw-semibold mb-4">"{{ item.title }}"</p>
        <p class="text-muted small mb-4">This action cannot be undone.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-danger">
              <i class="bi bi-trash me-2"></i>Yes, Delete
            </button>
            <a href="{{ item.get_absolute_url }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
