{% extends 'base.html' %}
{% block title %}Resolve Item - Campus Lost & Found{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow text-center p-4" style="border-radius:20px;">
        <div class="mb-3" style="font-size:4rem; color:#198754;">
          <i class="bi bi-check-circle"></i>
        </div>
        <h3 class="fw-bold">Mark as Resolved?</h3>
        <p class="text-muted mb-1">Marking this item as resolved means it has been recovered:</p>
        <p class="fw-semibold mb-4">"{{ item.title }}"</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-success">
              <i class="bi bi-check-circle me-2"></i>Yes, Mark Resolved
            </button>
            <a href="{{ item.get_absolute_url }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
