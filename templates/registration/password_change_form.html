{% extends 'base.html' %}
{% block title %}Change Password - Campus Lost & Found{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="text-center mb-4">
        <h2 class="fw-bold">Change Password</h2>
      </div>
      <div class="card border-0 shadow p-4" style="border-radius:20px;">
        <form method="post">{% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-semibold small">{{ field.label }}</label>
            <input type="password" name="{{ field.html_name }}" class="form-control" required>
            {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
          </div>
          {% endfor %}
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Change Password</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
