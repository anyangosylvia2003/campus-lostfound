{% extends 'base.html' %}
{% block title %}Reset Password — Campus Lost & Found{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="text-center mb-4">
        <div style="width:64px;height:64px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
          <i class="bi bi-envelope-arrow-up text-white fs-3"></i>
        </div>
        <h2 class="fw-bold">Reset Password</h2>
        <p class="text-muted">Enter your email address and we'll send you a reset link.</p>
      </div>
      <div class="card border-0 shadow p-4" style="border-radius:20px;">
        <form method="post" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-bold">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-send me-2"></i>Send Reset Link
            </button>
          </div>
        </form>
      </div>
      <p class="text-center mt-3"><a href="{% url 'login' %}">Back to Login</a></p>
    </div>
  </div>
</div>
{% endblock %}
